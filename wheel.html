
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f093fb, #f5576c, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 
                0 0 0 8px rgba(255,255,255,0.1),
                0 0 0 12px rgba(255,255,255,0.05),
                0 0 50px rgba(245, 87, 108, 0.3),
                inset 0 0 30px rgba(0,0,0,0.3);
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #ffd200;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -35px;
            left: -10px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #fff;
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2d2d44, #1a1a2e);
            border-radius: 50%;
            border: 4px solid #ffd200;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .spin-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.5);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .spin-btn:disabled {
            background: linear-gradient(135deg, #555 0%, #333 100%);
            cursor: not-allowed;
            box-shadow: none;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: none;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result.show {
            display: block;
        }

        .result-xp {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(90deg, #ffd200, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-text {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>🎡 КОЛЕСО ФОРТУНЫ</h1>
        <p class="subtitle">Испытай удачу и выиграй XP!</p>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center-circle">🎯</div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">
            🎲 КРУТИТЬ!
        </button>
        
        <div class="result" id="result">
            <div class="result-xp" id="resultXp">+100 XP</div>
            <div class="result-text">Награда начислена!</div>
        </div>
    </div>

    <script>
        const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : { initData: '', expand(){}, ready(){}, sendData(){}, HapticFeedback: { notificationOccurred(){}, impactOccurred(){} }, colorScheme: 'dark' };
        try { tg.expand(); tg.ready(); } catch(e){}

        const prizes = [
            { value: 10, label: '10', color: '#e74c3c' },
            { value: 25, label: '25', color: '#9b59b6' },
            { value: 50, label: '50', color: '#3498db' },
            { value: 100, label: '100', color: '#2ecc71' },
            { value: 15, label: '15', color: '#e67e22' },
            { value: 75, label: '75', color: '#1abc9c' },
            { value: 30, label: '30', color: '#f39c12' },
            { value: 200, label: '200', color: '#ff6b9d' }
        ];

        let isSpinning = false;
        let currentRotation = 0;

        // Новая функция отправки
        function sendResult(type, score) {
            const data = {
                type: type,
                score: score,
                initData: tg.initData
            };
            tg.sendData(JSON.stringify(data));
        }

        function createWheel() {
            const wheel = document.getElementById('wheel');
            const segmentAngle = 360 / prizes.length;
            
            let svgContent = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;border-radius:50%;">`;
            
            prizes.forEach((prize, i) => {
                const startAngle = i * segmentAngle - 90;
                const endAngle = startAngle + segmentAngle;
                
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                
                const x1 = 50 + 50 * Math.cos(startRad);
                const y1 = 50 + 50 * Math.sin(startRad);
                const x2 = 50 + 50 * Math.cos(endRad);
                const y2 = 50 + 50 * Math.sin(endRad);
                
                const largeArc = segmentAngle > 180 ? 1 : 0;
                
                svgContent += `
                    <path d="M 50 50 L ${x1} ${y1} A 50 50 0 ${largeArc} 1 ${x2} ${y2} Z" 
                          fill="${prize.color}"/>
                `;
                
                const textAngle = startAngle + segmentAngle / 2;
                const textRad = (textAngle * Math.PI) / 180;
                const textX = 50 + 32 * Math.cos(textRad);
                const textY = 50 + 32 * Math.sin(textRad);
                
                svgContent += `
                    <text x="${textX}" y="${textY}" 
                          fill="white" 
                          font-size="8" 
                          font-weight="bold"
                          text-anchor="middle" 
                          dominant-baseline="middle"
                          transform="rotate(${textAngle + 90}, ${textX}, ${textY})">
                        ${prize.label}
                    </text>
                `;
            });
            
            svgContent += `</svg>`;
            wheel.innerHTML = svgContent;
        }

        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.textContent = '🎰 Крутится...';
            
            document.getElementById('result').classList.remove('show');
            
            const prizeIndex = Math.floor(Math.random() * prizes.length);
            const prize = prizes[prizeIndex];
            
            const segmentAngle = 360 / prizes.length;
            const targetAngle = 360 - (prizeIndex * segmentAngle + segmentAngle / 2);
            
            const spins = 5 + Math.random() * 3;
            const finalRotation = currentRotation + (spins * 360) + targetAngle - (currentRotation % 360);
            
            currentRotation = finalRotation;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            
            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
            
            setTimeout(() => {
                showResult(prize.value);
                isSpinning = false;
                btn.textContent = '✅ Готово!';
                // Отправляем результат
                sendResult('wheel_reward', prize.value);
            }, 4500);
        }

        function showResult(xp) {
            const result = document.getElementById('result');
            const resultXp = document.getElementById('resultXp');
            
            resultXp.textContent = `+${xp} XP`;
            result.classList.add('show');
            
            createConfetti();
            
            try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
        }

        function createConfetti() {
            const colors = ['#f093fb', '#f5576c', '#ffd200', '#00d2ff', '#2ecc71', '#9b59b6'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                    confetti.style.width = (5 + Math.random() * 10) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createWheel();
        createParticles();
        
        document.body.style.background = tg.colorScheme === 'dark' 
            ? 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)'
            : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
    </script>
</body>
</html>
