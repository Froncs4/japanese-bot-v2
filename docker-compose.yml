version: '3.8'

services:
  bot:
    build: .
    container_name: japanese_bot
    command: python bot.py --mode bot
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - app_network

  api:
    build: .
    container_name: japanese_api
    command: python bot.py --mode api
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

